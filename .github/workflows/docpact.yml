name: docpact

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Biaoo/docpact@v0.1.4
        with:
          version: 0.1.4
          args: >
            validate-config
            --root .
            --strict

  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Biaoo/docpact@v0.1.4
        with:
          version: 0.1.4
          args: >
            lint
            --root .
            --base ${{ github.event.pull_request.base.sha }}
            --head ${{ github.sha }}
            --mode enforce
